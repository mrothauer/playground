<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗣️ B-Sprache</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="b-sprache.css">
</head>
<body>
    <div class="bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <div class="container">
        <h1 id="languageTitle">🗣️
            <span class="letter-picker" id="letterPicker">
                <button type="button" id="mainLetterButton" aria-haspopup="listbox" aria-expanded="false" aria-label="Hauptbuchstabe auswählen">B</button>
                <div class="letter-grid" id="letterGrid" role="listbox" aria-label="Hauptbuchstaben">
                    <button type="button" class="letter-option is-active" data-letter="b" aria-selected="true">B</button>
                    <button type="button" class="letter-option" data-letter="c" aria-selected="false">C</button>
                    <button type="button" class="letter-option" data-letter="d" aria-selected="false">D</button>
                    <button type="button" class="letter-option" data-letter="f" aria-selected="false">F</button>
                    <button type="button" class="letter-option" data-letter="g" aria-selected="false">G</button>
                    <button type="button" class="letter-option" data-letter="h" aria-selected="false">H</button>
                    <button type="button" class="letter-option" data-letter="j" aria-selected="false">J</button>
                    <button type="button" class="letter-option" data-letter="k" aria-selected="false">K</button>
                    <button type="button" class="letter-option" data-letter="l" aria-selected="false">L</button>
                    <button type="button" class="letter-option" data-letter="m" aria-selected="false">M</button>
                    <button type="button" class="letter-option" data-letter="n" aria-selected="false">N</button>
                    <button type="button" class="letter-option" data-letter="p" aria-selected="false">P</button>
                    <button type="button" class="letter-option" data-letter="q" aria-selected="false">Q</button>
                    <button type="button" class="letter-option" data-letter="r" aria-selected="false">R</button>
                    <button type="button" class="letter-option" data-letter="s" aria-selected="false">S</button>
                    <button type="button" class="letter-option" data-letter="t" aria-selected="false">T</button>
                    <button type="button" class="letter-option" data-letter="v" aria-selected="false">V</button>
                    <button type="button" class="letter-option" data-letter="w" aria-selected="false">W</button>
                    <button type="button" class="letter-option" data-letter="x" aria-selected="false">X</button>
                    <button type="button" class="letter-option" data-letter="y" aria-selected="false">Y</button>
                    <button type="button" class="letter-option" data-letter="z" aria-selected="false">Z</button>
                </div>
                <input type="hidden" id="mainLetter" name="mainLetter" value="b">
            </span>
            <span id="languageSuffix">-Sprache</span>
        </h1>
        <p class="subtitle" id="languageSubtitle">Der ultimative B-Sprache-Übübebersebetzeber! ✨</p>

        <div class="card">
            <div class="card-label"><span class="icon">✏️</span> Dein Text</div>
            <textarea id="inputText" name="inputText" placeholder="Schreib hier was rein...">Es wohnt jetzt ein Kater in unserem Haus.</textarea>
            <div class="char-count"><span id="charCount">0</span> Zeichen</div>
        </div>

        <div class="card">
            <div class="card-label" id="outputLabel"><span class="icon">🪄</span> In B-Sprache</div>
            <div id="output"></div>
        </div>

        <div class="footer">Tippe einfach drauf los – die Übersetzung passiert sofort! 🚀</div>
    </div>

    <script>
    (function() {
        const colors = ['#ff0000','#ff8800','#ffff00','#00cc00','#0066ff','#4400cc','#8800ff'];
        for (let i = colors.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [colors[i], colors[j]] = [colors[j], colors[i]];
        }
        const stops = colors.map((c, i) => c + ' ' + Math.round(i / (colors.length - 1) * 100) + '%').join(', ');
        document.body.style.background = 'linear-gradient(135deg, ' + stops + ')';
        document.body.style.backgroundSize = '400% 400%';
    })();
    </script>
    <script src="b-sprache.js"></script>
</body>
</html>
