<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-Sprache</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        h1 {
            background-color: #333;
            color: #fff;
            padding: 5px;
            margin: 0;
            font-size: 1.3em;
        }
        textarea {
            width: 100%;
            height: 100px;
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        #output {
            width: 100%;
            height: 100%;
            overflow: auto;
            padding: 10px;
            box-sizing: border-box;
            background-color: #fff;
            border: 1px solid #ccc;
        }
        form {
            padding: 10px;
            background-color: #fff;
            border: 1px solid #ccc;
            margin: 10px;
        }
    </style>
</head>
<body>
    <h1>B-Sprache</h1>
    <textarea id="inputText" name="inputText" placeholder="Gib hier deinen Text ein...">Es wohnt jetzt ein Kater in unserem Haus.</textarea>
    <div id="output"></div>
    <script src="b-sprache.js"></script>
</body>
</html>
