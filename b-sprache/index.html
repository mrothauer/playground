<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗣️ B-Sprache</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="b-sprache.css">
</head>
<body>
    <div class="bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <div class="container">
        <h1>🗣️ B-Sprache</h1>
        <p class="subtitle">Der ultimative B-Sprache-Übübebersebetzeber! ✨</p>

        <div class="card">
            <div class="card-label"><span class="icon">✏️</span> Dein Text</div>
            <textarea id="inputText" name="inputText" placeholder="Schreib hier was rein...">Es wohnt jetzt ein Kater in unserem Haus.</textarea>
            <div class="char-count"><span id="charCount">0</span> Zeichen</div>
        </div>

        <div class="card">
            <div class="card-label"><span class="icon">🪄</span> In B-Sprache</div>
            <div id="output"></div>
        </div>

        <div class="footer">Tippe einfach drauf los – die Übersetzung passiert sofort! 🚀</div>
    </div>

    <script>
    (function() {
        const colors = ['#ff0000','#ff8800','#ffff00','#00cc00','#0066ff','#4400cc','#8800ff'];
        for (let i = colors.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [colors[i], colors[j]] = [colors[j], colors[i]];
        }
        const stops = colors.map((c, i) => c + ' ' + Math.round(i / (colors.length - 1) * 100) + '%').join(', ');
        document.body.style.background = 'linear-gradient(135deg, ' + stops + ')';
        document.body.style.backgroundSize = '400% 400%';
    })();
    </script>
    <script src="b-sprache.js"></script>
</body>
</html>
